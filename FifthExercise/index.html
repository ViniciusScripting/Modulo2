<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>CSS Propriedades</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap');
    body {
      background-color: cornflowerblue;
      color: white;
      font-size: 30px;
    }

    #color {
        color: coral;
    }
    
    #size {
        font-size: 2rem;
    }

    #weight {
        font-weight: 900;
    }

    #family {
        font-family: "Caveat", cursive;
    }
    
    #align {
        text-align: left;
    }


    
  </style>
</head>

<body>
  <h1>Important CSS Properties</h1>
  <p id="color">Color</p>
  <p id= "size">Font Size</p>
  <p id= "weight">Font Weight</p>
  <p id= "family">Font Family</p>
  <p id= "align">Text Align</p>

  6. Mude o tamanho da fonte raiz (elemento html) para 30px. 
</body>

</html>
